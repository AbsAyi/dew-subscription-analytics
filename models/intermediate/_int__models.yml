version: 2

models:
  - name: int_customers__unified
    description: "Unified customer spine from Shopify + Recharge."
    columns:
      - name: shopify_customer_id
        tests:
          - unique
          - not_null
      - name: customer_email
        tests:
          - unique
          - not_null

  - name: int_orders__enriched
    description: "Orders with line items, order sequence, and attribution."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null

  - name: int_payments__reconciled
    description: "Shopify-Stripe payment matching with reconciliation flags."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: reconciliation_status
        tests:
          - accepted_values:
              values: ['reconciled', 'no_stripe_match', 'amount_mismatch', 'orphaned_refund']