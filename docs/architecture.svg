  <text x="1040" y="175" text-anchor="middle" fill="#f78166" font-size="11" font-weight="700">📊 Power BI Dashboard</text>
  
  <!-- Dashboard pages -->
  <rect x="955" y="198" width="170" height="42" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
