  <line x1="665" y1="250" x2="708" y2="300" stroke="#bc8cff" stroke-width="1.2" marker-end="url(#arrowPurple)"/>
  <line x1="665" y1="335" x2="708" y2="320" stroke="#bc8cff" stroke-width="1.2" marker-end="url(#arrowPurple)"/>

