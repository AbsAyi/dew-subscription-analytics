  <text x="36" y="532" fill="#8b949e" font-size="10">└ refunds</text>
  <text x="36" y="556" fill="#484f58" font-size="8" font-style="italic">⚠ amounts in cents</text>
  <text x="36" y="570" fill="#484f58" font-size="8" font-style="italic">⚠ ghost failures, orphans</text>

