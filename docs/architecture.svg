  <text x="1040" y="230" text-anchor="middle" fill="#8b949e" font-size="8">MRR · Active Subs · Churn</text>

  <rect x="955" y="250" width="170" height="42" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="1040" y="268" text-anchor="middle" fill="#e6edf3" font-size="9.5" font-weight="600">Cohort Retention</text>
  <text x="1040" y="282" text-anchor="middle" fill="#8b949e" font-size="8">Heatmap · LTV Curves</text>

  <rect x="955" y="302" width="170" height="42" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="1040" y="320" text-anchor="middle" fill="#e6edf3" font-size="9.5" font-weight="600">Revenue Reconciliation</text>
  <text x="1040" y="334" text-anchor="middle" fill="#8b949e" font-size="8">Shopify vs Stripe · Variance</text>

  <rect x="955" y="354" width="170" height="42" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="1040" y="372" text-anchor="middle" fill="#e6edf3" font-size="9.5" font-weight="600">Channel Performance</text>
