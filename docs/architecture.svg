<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" style="font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#bc8cff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d29922"/>
    </marker>

    <!-- Box shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bgGrad)" rx="12"/>
  
  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700" letter-spacing="0.5">🧴 Dew Skincare — Analytics Pipeline Architecture</text>
  <text x="600" y="62" text-anchor="middle" fill="#8b949e" font-size="11">Snowflake  →  dbt  →  Power BI</text>

  <!-- ==================== COLUMN HEADERS ==================== -->
  <!-- Sources -->
  <text x="105" y="95" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1">SOURCES</text>
  <text x="105" y="109" text-anchor="middle" fill="#484f58" font-size="9">Snowflake raw</text>
  
  <!-- Staging -->
  <text x="340" y="95" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1">STAGING</text>
  <text x="340" y="109" text-anchor="middle" fill="#484f58" font-size="9">dbt views</text>

  <!-- Intermediate -->
  <text x="570" y="95" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1">INTERMEDIATE</text>
  <text x="570" y="109" text-anchor="middle" fill="#484f58" font-size="9">dbt ephemeral</text>

  <!-- Marts -->
  <text x="800" y="95" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1">MARTS</text>
  <text x="800" y="109" text-anchor="middle" fill="#484f58" font-size="9">dbt tables</text>

  <!-- Power BI -->
  <text x="1040" y="95" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1">POWER BI</text>
  <text x="1040" y="109" text-anchor="middle" fill="#484f58" font-size="9">Consumption</text>

  <!-- Vertical divider lines -->
  <line x1="220" y1="85" x2="220" y2="700" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="455" y1="85" x2="455" y2="700" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="685" y1="85" x2="685" y2="700" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="920" y1="85" x2="920" y2="700" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>


  <!-- ==================== SHOPIFY ROW ==================== -->
  <!-- Source: Shopify -->
  <rect x="20" y="130" width="170" height="140" rx="6" fill="#1c2128" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="130" width="170" height="26" rx="6" fill="#f0883e" opacity="0.15"/>
  <text x="105" y="148" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="700">raw_shopify</text>
  <text x="36" y="174" fill="#8b949e" font-size="10">├ orders</text>
  <text x="36" y="192" fill="#8b949e" font-size="10">├ order_line_items</text>
  <text x="36" y="210" fill="#8b949e" font-size="10">└ customers</text>
  <text x="36" y="234" fill="#484f58" font-size="8" font-style="italic">⚠ dupes, EST timestamps</text>
  <text x="36" y="248" fill="#484f58" font-size="8" font-style="italic">⚠ attribution gaps</text>

  <!-- Staging: Shopify -->
  <rect x="240" y="130" width="200" height="140" rx="6" fill="#1c2128" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="130" width="200" height="26" rx="6" fill="#58a6ff" opacity="0.12"/>
  <text x="340" y="148" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700">stg_shopify__*</text>
  <text x="256" y="174" fill="#c9d1d9" font-size="10">stg_shopify__orders</text>
  <text x="256" y="192" fill="#c9d1d9" font-size="10">stg_shopify__line_items</text>
  <text x="256" y="210" fill="#c9d1d9" font-size="10">stg_shopify__customers</text>
  <text x="256" y="234" fill="#3fb950" font-size="8">✓ deduplicated</text>
  <text x="256" y="248" fill="#3fb950" font-size="8">✓ EST → UTC converted</text>

  <!-- Arrow: Shopify source → staging -->
  <line x1="190" y1="200" x2="238" y2="200" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>


  <!-- ==================== RECHARGE ROW ==================== -->
  <!-- Source: Recharge -->
  <rect x="20" y="300" width="170" height="140" rx="6" fill="#1c2128" stroke="#a371f7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="300" width="170" height="26" rx="6" fill="#a371f7" opacity="0.15"/>
  <text x="105" y="318" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="700">raw_recharge</text>
