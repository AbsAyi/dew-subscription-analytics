  <rect x="240" y="300" width="200" height="26" rx="6" fill="#58a6ff" opacity="0.12"/>
  <text x="340" y="318" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700">stg_recharge__*</text>
  <text x="256" y="344" fill="#c9d1d9" font-size="10">stg_recharge__subscriptions</text>
  <text x="256" y="362" fill="#c9d1d9" font-size="10">stg_recharge__charges</text>
  <text x="256" y="380" fill="#c9d1d9" font-size="10">stg_recharge__customers</text>
  <text x="256" y="404" fill="#3fb950" font-size="8">✓ status mismatches resolved</text>
  <text x="256" y="418" fill="#3fb950" font-size="8">✓ error categories parsed</text>

  <!-- Arrow: Recharge source → staging -->
  <line x1="190" y1="370" x2="238" y2="370" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>


  <!-- ==================== STRIPE ROW ==================== -->
  <!-- Source: Stripe -->
  <rect x="20" y="470" width="170" height="130" rx="6" fill="#1c2128" stroke="#39d353" stroke-width="1.5" filter="url(#shadow)"/>
