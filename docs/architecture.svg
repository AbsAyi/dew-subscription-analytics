  <text x="36" y="380" fill="#8b949e" font-size="10">└ customers</text>
  <text x="36" y="404" fill="#484f58" font-size="8" font-style="italic">⚠ status mismatches</text>
  <text x="36" y="418" fill="#484f58" font-size="8" font-style="italic">⚠ TZ inconsistencies</text>

  <!-- Staging: Recharge -->
